platform:
  name: cycling-platform

sources:

  strava:

    enabled: true

    api_base_url: https://www.strava.com/api/v3

    stream_types:
      - time
      - latlng
      - distance
      - altitude
      - velocity_smooth
      - heartrate
      - cadence
      - watts
      - temp
      - moving
      - grade_smooth

  google_health:

    enabled: true

    api_base_url: https://health.googleapis.com/v4

    user_id: me

    data_types:
      - heart-rate
      - sleep

ingestion:

  # Number of days refreshed during routine ingestion runs
  activity_refresh_days: 30

  # Number of days refreshed during monthly hygiene runs
  activity_hygiene_days: 365

  # Number of days refreshed during historical backfills
  activity_backfill_days: 8000

  # Maximum activities returned per API request
  activities_per_page: 200

  # Number of activity IDs processed per stream ingestion transaction
  stream_activity_batch_size: 25

  # Number of activity IDs processed per detail ingestion transaction
  detail_activity_batch_size: 10

  # Number of activity IDs processed per lap ingestion transaction
  lap_activity_batch_size: 25

  # Maximum retries before failing an ingestion run
  max_retries: 3

  # API request timeout in seconds
  timeout_seconds: 60

  # Default pause between API requests
  request_pause_seconds: 0.25

  # Detail endpoint appears to have a lower practical throttle than app limits
  detail_request_pause_seconds: 10

  # Default pause between lap endpoint requests
  lap_request_pause_seconds: 0.25

  # Number of days refreshed during routine Google Health ingestion runs
  google_health_refresh_days: 7

  # Number of days refreshed during Google Health historical backfills
  google_health_backfill_days: 365

  # Logical detail level for raw Google/Fitbit heart-rate response rows
  google_health_heart_rate_detail_level: data_points

  # Number of days refreshed during routine Google Health sleep ingestion runs
  google_health_sleep_refresh_days: 7

  # Number of days refreshed during Google Health sleep historical backfills
  google_health_sleep_backfill_days: 365

  # Maximum Google Health data points returned per API page
  google_health_page_size: 10000

  # Number of date windows processed per Google Health transaction
  google_health_date_batch_size: 1

  # Default pause between Google Health API requests
  google_health_request_pause_seconds: 0.25

scheduling:

  # Desired ingestion cadence
  ingestion_frequency: daily

  # Desired hygiene cadence
  hygiene_frequency: monthly

notifications:

  enabled: true

  provider: ntfy

  topic: cycling-platform

logging:

  level: INFO

  retention_days: 30

backups:

  enabled: true

  retention_days: 30

validation:

  # Fast checks that block daily publication after Silver transforms
  publication_gate_per_check_timeout_seconds: 60

  publication_gate_overall_timeout_seconds: 180

  # Full validation suite run separately from daily publication
  deep_per_check_timeout_seconds: 900

  deep_overall_timeout_seconds: 7200

transforms:

  # Maximum activities processed per silver stream transformation batch
  silver_stream_activity_batch_size: 10

  # Maximum expected stream rows processed per silver stream batch
  silver_stream_batch_max_expected_rows: 5000

  # Gold best effort metrics calculated in v1
  gold_best_effort_metrics:
    - watts
    - cadence_rpm
    - heartrate_bpm

  # Gold best effort durations in seconds
  gold_best_effort_durations:
    - 5
    - 10
    - 20
    - 60
    - 120
    - 300
    - 600
    - 1200
    - 1800
    - 3600

  # Maximum activities processed per gold best effort batch
  gold_best_effort_activity_batch_size: 25
