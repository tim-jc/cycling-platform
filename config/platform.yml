platform:
  name: cycling-platform

sources:

  strava:

    enabled: true

    api_base_url: https://www.strava.com/api/v3

    stream_types:
      - time
      - latlng
      - distance
      - altitude
      - velocity_smooth
      - heartrate
      - cadence
      - watts
      - temp
      - moving
      - grade_smooth

ingestion:

  # Number of days refreshed during routine ingestion runs
  activity_refresh_days: 30

  # Number of days refreshed during monthly hygiene runs
  activity_hygiene_days: 365

  # Number of days refreshed during historical backfills
  activity_backfill_days: 8000

  # Maximum activities returned per API request
  activities_per_page: 200

  # Number of activity IDs processed per stream ingestion transaction
  stream_activity_batch_size: 25

  # Number of activity IDs processed per detail ingestion transaction
  detail_activity_batch_size: 10

  # Maximum retries before failing an ingestion run
  max_retries: 3

  # API request timeout in seconds
  timeout_seconds: 60

  request_pause_seconds: 0.25

scheduling:

  # Desired ingestion cadence
  ingestion_frequency: daily

  # Desired hygiene cadence
  hygiene_frequency: monthly

notifications:

  enabled: true

  provider: ntfy

  topic: cycling-platform

logging:

  level: INFO

  retention_days: 30

backups:

  enabled: true

  retention_days: 30
